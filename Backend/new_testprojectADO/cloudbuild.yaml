steps:

# Build Docker image
- name: 'gcr.io/cloud-builders/docker'
  args:
    [
      'build',
      '-t',
      'us-central1-docker.pkg.dev/project-511e3fcc-1e7b-40fd-a5c/employee-repo/employee-api',
      '.'
    ]

# Push Docker image
- name: 'gcr.io/cloud-builders/docker'
  args:
    [
      'push',
      'us-central1-docker.pkg.dev/project-511e3fcc-1e7b-40fd-a5c/employee-repo/employee-api'
    ]

images:
- 'us-central1-docker.pkg.dev/project-511e3fcc-1e7b-40fd-a5c/employee-repo/employee-api'

options:
  logging: CLOUD_LOGGING_ONLY